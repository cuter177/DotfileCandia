font_family JetBrains Mono
font_size 14.0
background_opacity 0.5
# background       #1e1e2e
# foreground       #c0caf5
# cursor           #f7768e

shell /bin/zsh

# Asegúrate de que el ratón esté habilitado
enable_mouse_reporting yes

term xterm-256color

#BEGIN_KITTY_THEME
#Catppuccin-Mocha
include current-theme.conf
#END_KITTY_THEME
